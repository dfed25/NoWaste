name: Feature request
description: Plan a new feature
title: "[Feature] "
labels: ["feature"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the feature
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      placeholder: What is included and not included?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: List clear acceptance criteria
    validations:
      required: true
