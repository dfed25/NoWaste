<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <title>NoWaste</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f8fafc;
        color: #475569;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
        text-align: center;
        box-sizing: border-box;
      }
      p {
        margin: 0;
        max-width: 22rem;
        font-size: 0.95rem;
        line-height: 1.45;
      }
      code {
        font-size: 0.85em;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p>
        Native shell placeholder. With live reload (<code>npm run sim:ios</code>),
        the app loads your Next dev server. Without <code>server.url</code>,
        deploy the web app and set <code>CAP_SERVER_URL</code> / production server
        config in Capacitor.
      </p>
    </div>
  </body>
</html>
